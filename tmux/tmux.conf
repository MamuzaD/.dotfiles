# daniel's tmux config
# ============================

set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set-option -g allow-passthrough on
set-option -g set-titles on
set-window-option -g automatic-rename on
set -g mouse on
set -s escape-time 50
set -g display-time 300

# status bar
set -g status-position bottom
set -g status-interval 10

set -g status-style 'fg=default,bg=default'
set -g status-left-length 40
set -g status-left '#[fg=colour235,bg=colour252,bold]  #S   #[fg=#E4E4E4,bg=default,nobold]'
set -g status-right '#(~/.local/bin/tmux-git-status "#{pane_current_path}")#[fg=colour235,bg=colour252,bold]  %H:%M  %d-%b-%y  #[fg=colour252,bg=default,nobold]'
set-window-option -g window-status-style 'fg=default,bg=default'
set-window-option -g window-status-format ' #I-#W '
set-window-option -g window-status-current-style 'fg=#E4E4E4,bg=#7AA2F7,bold'
set-window-option -g window-status-current-format ' #I-#W '
set-window-option -g window-status-activity-style 'fg=colour1,bg=default,bold'

# reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
set -g base-index 1
set -g renumber-windows on

# vim-like copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

# clipboard
set -s set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# wsl: bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
# bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# windows
# tmux-afterkill
bind-key K run-shell "~/.local/bin/tmux-afterkill"

# popups
# tmux-sessionizer
bind-key -r f run-shell "tmux display-popup -E ~/.local/bin/tmux-sessionizer"
# tmux-cht.sh
bind-key -r i run-shell "tmux display-popup -E ~/.local/bin/tmux-cht.sh"
# lazy git
bind-key g run-shell 'tmux display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "XDG_CONFIG_HOME=$HOME/.config lazygit"'
# list-keys
bind-key ? run-shell "tmux display-popup -w 80% -h 80% -E 'tmux list-keys | fzf'"
# wallpaper
# swap: prefix+w = wallpaper menu, prefix+W = choose-tree
unbind-key -T prefix w
unbind-key -T prefix W
bind-key -T prefix W choose-tree -Zw
bind-key w run-shell "tmux display-popup -w 40% -h 35% -E ~/.local/bin/wallpaper"

# menu
# dotfile
bind-key d display-menu -T "#[align=centre] .dotfiles menu " \
    "⏏  detach"                    d "detach" \
    "" \
    "#[fg=#7EBF50]  nvim"         n "run-shell 'tmux display-popup -w 80% -h 80% -E nvim ~/.config/nvim'" \
    "#[fg=#1BB91F]  tmux"         t "run-shell 'tmux display-popup -w 80% -h 80% -E nvim ~/.config/tmux/tmux.conf'" \
    "#[fg=#6A5ACC]  zshrc"        z "run-shell 'tmux display-popup -w 80% -h 80% -E nvim ~/.zshrc'" \
    "#[fg=#3551f3]󰊠  ghostty"      g "run-shell 'tmux display-popup -w 80% -h 80% -E nvim ~/.config/ghostty/config'" \
    "" \
    "#[fg=#7DCFFF]  projects"     p "run-shell 'tmux display-popup -d \"#{pane_current_path}\" -w 91% -h 80% -E nvim ~/Documents/projects.md'" \
    "#[fg=#FFD600]  studious"     s "run-shell 'tmux display-popup -d \"#{pane_current_path}\" -w 80% -h 80% -E nvim ~/School/junior/spring/classes.md'"
